<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      width: 340px;
      padding: 16px;
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
    }

    .header {
      text-align: center;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }

    .header h3 {
      font-size: 18px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 4px;
    }

    .header p {
      font-size: 11px;
      color: #888;
    }

    .stats {
      background: rgba(255, 255, 255, 0.05);
      padding: 12px;
      border-radius: 10px;
      margin-bottom: 12px;
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .stat-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 4px 0;
      font-size: 13px;
    }

    .stat-row .label {
      color: #aaa;
    }

    .stat-row .value {
      font-weight: 600;
    }

    .attention-score {
      text-align: center;
      margin: 8px 0;
    }

    .attention-score .score {
      font-size: 28px;
      font-weight: 700;
    }

    .good {
      color: #4CAF50;
    }

    .warning {
      color: #FF9800;
    }

    .danger {
      color: #F44336;
    }

    .section {
      margin-bottom: 12px;
    }

    .section-title {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #888;
      margin-bottom: 8px;
    }

    select {
      width: 100%;
      padding: 8px 12px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 8px;
      color: #e0e0e0;
      font-size: 13px;
      cursor: pointer;
      outline: none;
    }

    select:focus {
      border-color: #667eea;
    }

    .btn-row {
      display: flex;
      gap: 8px;
      margin-top: 10px;
    }

    button {
      flex: 1;
      padding: 8px 12px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
      transition: all 0.2s;
    }

    .btn-primary {
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
    }

    .btn-primary:hover {
      opacity: 0.9;
      transform: translateY(-1px);
    }

    .btn-secondary {
      background: rgba(255, 255, 255, 0.1);
      color: #e0e0e0;
      border: 1px solid rgba(255, 255, 255, 0.15);
    }

    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.15);
    }

    /* Block Sites Section */
    .add-site-row {
      display: flex;
      gap: 6px;
      margin-bottom: 8px;
    }

    .add-site-row input {
      flex: 1;
      padding: 8px 12px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 8px;
      color: #e0e0e0;
      font-size: 13px;
      outline: none;
    }

    .add-site-row input:focus {
      border-color: #667eea;
    }

    .add-site-row input::placeholder {
      color: #666;
    }

    .btn-add {
      padding: 8px 14px;
      background: #4CAF50;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      white-space: nowrap;
    }

    .btn-add:hover {
      background: #43A047;
    }

    .site-list {
      max-height: 160px;
      overflow-y: auto;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .site-list::-webkit-scrollbar {
      width: 4px;
    }

    .site-list::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.2);
      border-radius: 4px;
    }

    .site-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 12px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      font-size: 13px;
    }

    .site-item:last-child {
      border-bottom: none;
    }

    .site-item .site-name {
      color: #e0e0e0;
      word-break: break-all;
    }

    .site-item .btn-remove {
      background: none;
      border: none;
      color: #F44336;
      cursor: pointer;
      font-size: 16px;
      padding: 2px 6px;
      border-radius: 4px;
      flex-shrink: 0;
      line-height: 1;
    }

    .site-item .btn-remove:hover {
      background: rgba(244, 67, 54, 0.15);
    }

    .empty-list {
      padding: 16px;
      text-align: center;
      font-size: 12px;
      color: #666;
    }

    .blocking-status {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 12px;
      border-radius: 8px;
      font-size: 12px;
      margin-bottom: 8px;
    }

    .blocking-active {
      background: rgba(76, 175, 80, 0.15);
      color: #4CAF50;
      border: 1px solid rgba(76, 175, 80, 0.3);
    }

    .blocking-inactive {
      background: rgba(255, 152, 0, 0.15);
      color: #FF9800;
      border: 1px solid rgba(255, 152, 0, 0.3);
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .status-dot.active {
      background: #4CAF50;
      animation: blink 1.5s infinite;
    }

    .status-dot.inactive {
      background: #FF9800;
    }

    @keyframes blink {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0.4;
      }
    }
  </style>
</head>

<body>
  <div class="header">
    <h3>🎯 MindForge Focus</h3>
    <p>Stay focused, stay sharp</p>
  </div>

  <div class="stats">
    <div class="stat-row">
      <span class="label">Tab Switches</span>
      <span class="value" id="tabSwitches">0</span>
    </div>
    <div class="stat-row">
      <span class="label">Session Time</span>
      <span class="value" id="sessionTime">0m</span>
    </div>
    <div class="attention-score">
      <div style="font-size: 11px; color: #888;">Attention Score</div>
      <div class="score" id="attentionScore">100%</div>
    </div>
  </div>

  <div class="section">
    <div class="section-title">Study Mode</div>
    <select id="studyMode">
      <option value="focus">🎯 Focus Mode (Block listed sites)</option>
      <option value="exam">🔒 Exam Mode (Strict blocking)</option>
      <option value="basic">💤 Basic Mode (No blocking)</option>
    </select>
    <div class="btn-row">
      <button class="btn-secondary" id="resetSession">↺ Reset</button>
      <button class="btn-primary" id="focusTimer">⏱ 25min Focus</button>
    </div>
  </div>

  <div class="section">
    <div class="section-title">Blocked Websites</div>
    <div id="blockingStatus" class="blocking-status blocking-active">
      <div class="status-dot active"></div>
      <span>Blocking is active</span>
    </div>
    <div class="add-site-row">
      <input type="text" id="newSiteInput" placeholder="e.g. facebook.com or instagram" />
      <button class="btn-add" id="addSiteBtn">+ Add</button>
    </div>
    <div class="site-list" id="siteList">
      <div class="empty-list">No sites blocked</div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>

</html>
